  button { cursor: pointer; font-family: var(--font); border: none; background: none; color: inherit; }
  input, textarea { font-family: var(--font); }

  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
  .tag-green { background: rgba(110,231,183,0.12); color: var(--accent); }
  .tag-purple { background: rgba(167,139,250,0.12); color: var(--purple); }
  .tag-amber { background: rgba(251,191,36,0.12); color: var(--amber); }
  .tag-red { background: rgba(248,113,113,0.12); color: var(--red); }
  .tag-blue { background: rgba(96,165,250,0.12); color: var(--blue); }
  .tag-gray { background: rgba(255,255,255,0.07); color: var(--text2); }

  .progress-bar { height: 4px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent3), var(--accent)); border-radius: 99px; transition: width 0.5s ease; }

  .btn-primary { background: var(--accent3); color: #000; font-weight: 600; padding: 7px 16px; border-radius: var(--radius); font-size: 13px; transition: all 0.15s; cursor: pointer; border: none; font-family: var(--font); }
  .btn-primary:hover { background: var(--accent); }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); padding: 6px 14px; border-radius: var(--radius); font-size: 13px; transition: all 0.15s; cursor: pointer; font-family: var(--font); }
  .btn-ghost:hover { border-color: var(--accent3); color: var(--accent); background: rgba(110,231,183,0.05); }

  .checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .checkbox.done { background: var(--accent3); border-color: var(--accent3); }
  .checkbox.done::after { content: '✓'; color: #000; font-size: 11px; font-weight: 700; }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 20px; }

function useProgress() {
  const [completed, setCompleted] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ia_pro_completed') || '{}'); } catch { return {}; }
  });
  const [notes, setNotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ia_pro_notes') || '{}'); } catch { return {}; }
  });
  const [favorites, setFavorites] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('ia_pro_favorites') || '[]')); } catch { return new Set(); }
  });

  const toggle = useCallback((id) => {
    setCompleted(prev => {
      const next = { ...prev, [id]: !prev[id] };
      try { localStorage.setItem('ia_pro_completed', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const saveNote = useCallback((id, text) => {
    setNotes(prev => {
      const next = { ...prev, [id]: text };
      try { localStorage.setItem('ia_pro_notes', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const toggleFav = useCallback((id) => {
    setFavorites(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      try { localStorage.setItem('ia_pro_favorites', JSON.stringify([...next])); } catch {}
      return next;
    });
  }, []);

  const totalUnits = MODULES.reduce((a, m) => a + m.units.length, 0);
  const doneUnits = Object.values(completed).filter(Boolean).length;
  const pct = Math.round((doneUnits / totalUnits) * 100);
  const totalHours = MODULES.reduce((a, m) => a + m.hours, 0);
  const doneHours = MODULES.reduce((a, m) => a + m.units.reduce((b, u) => b + (completed[u.id] ? Math.round(u.time/60) : 0), 0), 0);

  return { completed, toggle, notes, saveNote, favorites, toggleFav, pct, totalUnits, doneUnits, totalHours, doneHours };
}

                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 8 }}>OBJETIVO</div>
                      <p style={{ fontSize: 13, color: 'var(--text2)', background: 'var(--bg3)', padding: '10px 12px', borderRadius: 8, borderLeft: '2px solid var(--accent3)' }}>{unit.goal}</p>
                    </div>
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 8 }}>RECURSOS</div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                        {unit.resources.map((r, i) => {
                          const ri = RESOURCE_ICONS[r.type] || RESOURCE_ICONS.doc;
                          return (
                            <a key={i} href={r.url} target="_blank" rel="noopener noreferrer"
                              style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: 'var(--bg3)', borderRadius: 8, border: '1px solid var(--border)', textDecoration: 'none', color: 'inherit' }}>
                              <i className={`ti ${ri.icon}`} style={{ fontSize: 15, color: ri.color, flexShrink: 0 }}></i>
                              <span style={{ fontSize: 13, color: 'var(--text)' }}>{r.label}</span>
                              <i className="ti ti-external-link" style={{ fontSize: 13, color: 'var(--text3)', marginLeft: 'auto' }}></i>
                            </a>
                          );
                        })}
                      </div>
                    </div>
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 8 }}>PRÁCTICA</div>
                      <div style={{ fontSize: 13, color: 'var(--text2)', background: 'rgba(167,139,250,0.06)', border: '1px solid rgba(167,139,250,0.15)', padding: '10px 12px', borderRadius: 8 }}>
                        <i className="ti ti-flask" style={{ marginRight: 6, color: 'var(--purple)' }}></i>{unit.practice}
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 6 }}>NOTAS PERSONALES</div>
                      <textarea
                        value={notes[unit.id] || ''}
                        onChange={e => saveNote(unit.id, e.target.value)}
                        placeholder="Escribe tus notas, preguntas o reflexiones aquí..."
                        style={{ width: '100%', minHeight: 80, background: 'var(--bg4)', border: '1px solid var(--border)', borderRadius: 8, padding: '8px 10px', fontSize: 12.5, color: 'var(--text)', resize: 'vertical', outline: 'none', fontFamily: 'var(--font)' }}
                      />
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {activeTab === 'practice' && (
        <div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, padding: 20, marginBottom: 16 }}>
            <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Ejercicios del módulo</h3>
            {module.units.map((u, i) => (
              <div key={u.id} style={{ padding: '10px 0', borderBottom: '1px solid var(--border)' }}>
                <div style={{ fontSize: 12, color: 'var(--accent)', marginBottom: 3, fontWeight: 500 }}>Ejercicio {i+1} · {u.title}</div>
                <div style={{ fontSize: 13, color: 'var(--text2)' }}>{u.practice}</div>
                <div style={{ marginTop: 6 }}>
                  <span className="tag tag-gray"><i className="ti ti-clock"></i> ~{u.time} min</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{ background: 'rgba(251,191,36,0.06)', border: '1px solid rgba(251,191,36,0.15)', borderRadius: 12, padding: 20 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, color: 'var(--amber)', marginBottom: 8 }}>💡 Consejo para tu perfil</h3>
            <p style={{ fontSize: 13, color: 'var(--text2)', lineHeight: 1.6 }}>Como contadora con experiencia en lógica de negocio, aplicá cada ejercicio a un caso real de tu trabajo. La mejor práctica es resolver un problema tuyo real con la herramienta del módulo.</p>
          </div>
        </div>
      )}

      {activeTab === 'project' && module.project && (
        <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 24 }}>
          <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
            <span className="tag tag-purple">Mini Proyecto</span>
            <span className="tag tag-gray">Módulo {module.id}</span>
          </div>
          <h3 style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>{module.project.title}</h3>
          <p style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 16 }}>{module.project.desc}</p>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 8 }}>TECNOLOGÍAS</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {module.project.tech.map(t => <span key={t} className="tag tag-gray">{t}</span>)}
          </div>
        </div>
      )}
    </div>
  );
}

function ProjectsView() {
  const [selected, setSelected] = useState(null);
  const diffColor = { 'Inicial-Medio': 'tag-green', 'Medio': 'tag-blue', 'Avanzado': 'tag-red' };

  return (
    <div className="fade-in" style={{ maxWidth: 780, margin: '0 auto', padding: '32px 24px' }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontFamily: 'var(--serif)', fontSize: 24, fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 8 }}>Proyectos Integradores</h1>
        <p style={{ color: 'var(--text2)', fontSize: 14 }}>Proyectos reales end-to-end para consolidar todo el aprendizaje.</p>
      </div>

      {!selected ? (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          {FINAL_PROJECTS.map(p => (
            <div key={p.id} className="card" onClick={() => setSelected(p)} style={{ cursor: 'pointer', transition: 'all 0.2s' }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(110,231,183,0.3)'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.transform = 'none'; }}>
              <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                <span className={`tag ${p.color}`}><i className={`ti ${p.icon}`}></i></span>
                <span className={`tag ${diffColor[p.difficulty] || 'tag-gray'}`}>{p.difficulty}</span>
              </div>
              <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 8 }}>{p.title}</h3>
              <p style={{ fontSize: 12.5, color: 'var(--text2)', lineHeight: 1.6 }}>{p.desc}</p>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 12 }}>
                {p.tech.slice(0,3).map(t => <span key={t} className="tag tag-gray" style={{ fontSize: 11 }}>{t}</span>)}
                {p.tech.length > 3 && <span className="tag tag-gray" style={{ fontSize: 11 }}>+{p.tech.length-3}</span>}
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div>
          <button className="btn-ghost" onClick={() => setSelected(null)} style={{ marginBottom: 20 }}>
            <i className="ti ti-arrow-left"></i> Volver a proyectos
          </button>
          <div className="card">
            <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
              <span className={`tag ${selected.color}`}><i className={`ti ${selected.icon}`}></i> Proyecto Final</span>
              <span className={`tag ${diffColor[selected.difficulty] || 'tag-gray'}`}>{selected.difficulty}</span>
            </div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 600, marginBottom: 8 }}>{selected.title}</h2>
            <p style={{ fontSize: 13.5, color: 'var(--text2)', marginBottom: 20, lineHeight: 1.6 }}>{selected.desc}</p>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 10 }}>TECNOLOGÍAS</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {selected.tech.map(t => <span key={t} className="tag tag-gray">{t}</span>)}
              </div>
            </div>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 10 }}>FASES DE IMPLEMENTACIÓN</div>
              {selected.phases.map((phase, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 8 }}>
                  <div style={{ width: 22, height: 22, background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: 'var(--accent)', fontFamily: 'var(--mono)', flexShrink: 0 }}>{i+1}</div>
                  <span style={{ fontSize: 13, color: 'var(--text2)', paddingTop: 2 }}>{phase}</span>
                </div>
              ))}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div style={{ background: 'rgba(110,231,183,0.06)', border: '1px solid rgba(110,231,183,0.15)', borderRadius: 10, padding: '12px 14px' }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--accent)', marginBottom: 4 }}>RESULTADO ESPERADO</div>
                <p style={{ fontSize: 12.5, color: 'var(--text2)' }}>{selected.outcome}</p>
              </div>
              <div style={{ background: 'rgba(251,191,36,0.06)', border: '1px solid rgba(251,191,36,0.15)', borderRadius: 10, padding: '12px 14px' }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--amber)', marginBottom: 4 }}>VALOR PROFESIONAL</div>
                <p style={{ fontSize: 12.5, color: 'var(--text2)' }}>{selected.value}</p>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ResourcesView({ favorites, completed }) {
  const favUnits = MODULES.flatMap(m => m.units.filter(u => favorites.has(u.id)).map(u => ({ ...u, moduleName: m.title, moduleId: m.id })));
  const allResources = [
    { cat: "Prompting", links: [
      { label: "Prompt Engineering Guide", url: "https://www.promptingguide.ai/es", type: "doc" },
      { label: "Anthropic Cookbook", url: "https://github.com/anthropics/anthropic-cookbook", type: "github" },
      { label: "OpenAI Prompting Best Practices", url: "https://platform.openai.com/docs/guides/prompt-engineering", type: "doc" },
    ]},
    { cat: "Automatización", links: [
      { label: "Make Academy (Gratis)", url: "https://academy.make.com", type: "interactive" },
      { label: "n8n Docs", url: "https://docs.n8n.io", type: "doc" },
      { label: "n8n Community Templates", url: "https://n8n.io/workflows/", type: "interactive" },
    ]},
    { cat: "APIs & Dev", links: [
      { label: "Postman Learning Center", url: "https://learning.postman.com", type: "interactive" },
      { label: "OpenAI API Reference", url: "https://platform.openai.com/docs/api-reference", type: "doc" },
      { label: "Anthropic API Docs", url: "https://docs.anthropic.com", type: "doc" },
    ]},
    { cat: "Agentes IA", links: [
      { label: "Building Effective Agents – Anthropic", url: "https://www.anthropic.com/research/building-effective-agents", type: "blog" },
      { label: "LangChain Docs", url: "https://python.langchain.com/docs", type: "doc" },
      { label: "CrewAI Docs", url: "https://docs.crewai.com", type: "doc" },
    ]},
  ];

  return (
    <div className="fade-in" style={{ maxWidth: 780, margin: '0 auto', padding: '32px 24px' }}>
      <h1 style={{ fontFamily: 'var(--serif)', fontSize: 24, fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 8 }}>Recursos Rápidos</h1>
      <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 28 }}>Links esenciales organizados por categoría.</p>
      {favUnits.length > 0 && (
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--amber)', letterSpacing: '0.06em', marginBottom: 10 }}>⭐ FAVORITOS</div>
          {favUnits.map(u => (
            <div key={u.id} style={{ padding: '8px 12px', background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 8, marginBottom: 6, fontSize: 13 }}>
              <span style={{ color: 'var(--text3)', fontSize: 11 }}>Módulo {u.moduleId} · </span>
              <span style={{ color: 'var(--text)' }}>{u.title}</span>
            </div>
          ))}
        </div>
      )}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        {allResources.map(cat => (
          <div key={cat.cat} className="card">
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', letterSpacing: '0.05em', marginBottom: 12 }}>{cat.cat.toUpperCase()}</div>
            {cat.links.map((l, i) => {
              const ri = RESOURCE_ICONS[l.type] || RESOURCE_ICONS.doc;
              return (
                <a key={i} href={l.url} target="_blank" rel="noopener noreferrer"
                  style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 0', borderBottom: i < cat.links.length-1 ? '1px solid var(--border)' : 'none', textDecoration: 'none', color: 'var(--text2)', fontSize: 13 }}>
                  <i className={`ti ${ri.icon}`} style={{ fontSize: 14, color: ri.color, flexShrink: 0 }}></i>
                  {l.label}
                  <i className="ti ti-external-link" style={{ fontSize: 12, marginLeft: 'auto', color: 'var(--text3)' }}></i>
                </a>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [activeView, setActiveView] = useState('dashboard');
  const [activeModule, setActiveModule] = useState(1);
  const { completed, toggle, notes, saveNote, favorites, toggleFav, pct, totalUnits, doneUnits, totalHours, doneHours } = useProgress();
  const currentModule = MODULES.find(m => m.id === activeModule);

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar activeModule={activeModule} setActiveModule={setActiveModule} activeView={activeView} setActiveView={setActiveView} completed={completed} pct={pct} />
      <main style={{ flex: 1, overflowY: 'auto', background: 'var(--bg)' }}>
        {activeView === 'dashboard' && <Dashboard pct={pct} totalUnits={totalUnits} doneUnits={doneUnits} totalHours={totalHours} doneHours={doneHours} completed={completed} setActiveModule={setActiveModule} setActiveView={setActiveView} />}
        {activeView === 'module' && currentModule && <ModuleView module={currentModule} completed={completed} toggle={toggle} notes={notes} saveNote={saveNote} favorites={favorites} toggleFav={toggleFav} />}
        {activeView === 'projects' && <ProjectsView />}
        {activeView === 'resources' && <ResourcesView favorites={favorites} completed={completed} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
